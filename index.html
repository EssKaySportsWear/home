<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ess Kay Sports Wear</title>
  <script type="module" src="firebase.js"></script>
  <script type="module" src="app.js"></script>
  <style>


    body { 
      font-family: system-ui, sans-serif; 
      margin: 0; padding: 0; height: 100vh;
      background: color(#F3E3D0);
      background-blend-mode: screen;
    }
    
    body::before {
      content: '';
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      backdrop-filter: blur(8px); background: rgba(0,0,0,0.4);
      z-index: -1;
    }


    
    /* Navbar - position relative */


    .navbar {
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      height: 60px; 

      background-color: rgba(168,205,220,0.8);
      background: 
        linear-gradient(120deg, #AACDDC, #81A6C6),
        linear-gradient(145deg, #F3E3D0, #D2C4B4);

      backdrop-filter: blur(25px) saturate(180%);
      border: 1px solid #81A6C6;
      box-shadow: 
        0 8px 32px rgba(129,166,198,0.3),
        inset 0 1px 0 rgba(255,255,255,0.4);
      padding: 0 4rem; border-radius: 0 0 25px 25px;
      display: flex; align-items: center; justify-content: center; gap: 1.5rem;
      z-index: 1000; position: relative; min-width: 450px;
      transition: all 0.3s ease;
    }
    

    .navbar::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      background: linear-gradient(120deg, rgba(255,255,255,0.4), rgba(255,255,255,0.05), transparent);
      opacity: 0.4; pointer-events: none;
    }
    
    .navbar:hover {
      box-shadow: 
        0 12px 40px rgba(0, 38, 255, 0.3),
        inset 0 1px 0 rgba(255,255,255,0.5);
    }
    
    .navbar {
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow:
        0 10px 40px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,255,255,0.6),
        inset 0 -1px 0 rgba(255,255,255,0.1);
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
    }



    
    /* Single indicator */
    #indicator {
      position: absolute; top: 5px; left: 0; height: calc(100% - 10px);
      border-radius: 999px; background: #81A6C6; z-index: 1;
      transition: all 0.3s cubic-bezier(0.25,1,0.5,1);
    }
    
    /* Nav items */
    .nav-item {
      position: relative; z-index: 2; display: flex; align-items: center; gap: 0.5rem;
      padding: 12px 20px; border-radius: 20px; text-decoration: none; cursor: pointer;
      font-weight: 500; font-size: 15px; color: #D2C4B4; transition: all 0.3s ease;
    }
    
    .nav-item.active { 
      color: #81A6C6; 
      background: #F3E3D0;
    }
    
    .nav-item:hover:not(.active) { background: rgba(210,196,180,0.3); }
    
    #mainContent { padding-top: 80px; max-width: 1200px; margin: 0 auto; padding: 2rem; }

    /* Hero redesign */
    .hero {
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      max-width: 1200px; 
      margin: 120px auto 0; 
      padding: 2rem; 
      color: #2C3E50; 
      font-family: 'Inter Tight', -apple-system, sans-serif;
      gap: 2rem;
    }
    .text-section h1 {
      font-size: clamp(3rem, 7vw, 4.5rem); 
      font-weight: 900; 
      margin: 0 0 0.5rem; 
      letter-spacing: -0.02em; 
      opacity: 0.9; 
      text-shadow: 0 2px 15px rgba(0,0,0,0.5);
    }
    .text-section p {
      font-size: clamp(1.2rem, 3.5vw, 1.8rem); 
      margin: 0; 
      opacity: 0.85; 
      font-weight: 400; 
      text-shadow: 0 1px 8px rgba(0,0,0,0.5);
    }
    .image-section {
      flex: 1; 
      text-align: center;
      position: relative;
    }
    .custom-img {
      width: 73%; 
      aspect-ratio: 11/16; 
      border-radius: 25px; 
      object-fit: cover; 
      border: 3px solid white;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4), 0 0 30px rgba(0,0,139,0.6);
      margin-top: -70px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

      .custom-btn {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);

      background: linear-gradient(135deg, navy, #001f3f); 
      color: white; 
      border: none; 
      padding: 12px 30px; 
      border-radius: 25px; 
      font-size: 0.95rem; 
      font-weight: 600; 
      cursor: pointer; 
      box-shadow: 0 8px 25px rgba(0,0,139,0.4);
      transition: all 0.3s ease;
      z-index: 2;
      margin: 0;
    }
      .custom-btn:hover {
      transform: translateX(-50%) translateY(-2px); 
      box-shadow: 0 12px 35px rgba(0,0,139,0.6);
    }
  </style>

</head>
<body>
  <div class="navbar">
    <div id="indicator"></div>
    <a href="index.html" class="nav-item active">🏠 Home</a>
    <a href="#" class="nav-item">🛍️ Products</a>
    <a href="cart.html" class="nav-item">🛒 Cart</a>
    <a href="login.html" class="nav-item">🔐 SignUp/Login</a>
  </div>
  


  <div class="hero">
    <div class="text-section">
      <h1>Ess Kay Sports Wear</h1>
      <p style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); margin: 0; font-size: clamp(1.2rem, 3.5vw, 1.8rem); opacity: 0.85; font-weight: 400; text-shadow: 0 1px 8px rgba(0,0,0,0.5);">Where Comfort Means Professionalism</p>
    </div>
    <div class="image-section">
      <img src="CustomOrderImg.png" alt="Custom Order" class="custom-img">
      <button class="custom-btn" onclick="alert('Custom order feature coming soon!')">Custom Order</button>
    </div>
  </div>

  
  <div id="mainContent">
  </div>



  <script>
    const navbar = document.querySelector('.navbar');
    const navItems = document.querySelectorAll('.nav-item');
    const indicator = document.getElementById('indicator');
    
    function moveIndicator(el) {
      const rect = el.getBoundingClientRect();
      const navRect = navbar.getBoundingClientRect();
      const x = rect.left - navRect.left;
      const width = rect.width;
      
      indicator.style.transform = `translateX(${x}px)`;
      indicator.style.width = `${width}px`;
    }
    
    // Initial position
    const currentPage = window.location.pathname.split('/').pop() || 'index.html';
    navItems.forEach(item => {
      const href = item.getAttribute('href');
      if (href === currentPage) {
        item.classList.add('active');
        moveIndicator(item);
      }
    });
    
    // Click handler
    navItems.forEach(item => {
      item.addEventListener('click', e => {
        e.preventDefault();
        
        // Remove active
        navItems.forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        
        // Move indicator first
        moveIndicator(item);
        
        // Navigate after animation
        setTimeout(() => {
          window.location.href = item.getAttribute('href');
        }, 300);
      });
    });
    
    // Resize
    window.addEventListener('resize', () => {
      const activeItem = document.querySelector('.nav-item.active');
      if (activeItem) moveIndicator(activeItem);
    });
  </script>
</body>
</html>
