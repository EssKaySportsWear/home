<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EssKay Sportswear</title>
  <script type="module" src="firebase.js"></script>
  <script type="module" src="app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="module" src="navbar-complete.js"></script>
  <script type="module" src="auth.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #0a1018;
      --surface: rgba(255, 255, 255, 0.08);
      --surface-strong: rgba(8, 13, 21, 0.74);
      --surface-muted: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.12);
      --border-strong: rgba(123, 231, 255, 0.18);
      --text: #f8fbff;
      --muted: #aab4c2;
--muted-strong: #D2C4B4;
      --accent: #7be7ff;
      --accent-strong: #96fff0;
      --shadow: 0 25px 80px rgba(0, 0, 0, 0.45);
      --radius-lg: 32px;
      --content-width: min(1240px, calc(100% - 32px));
      --ease: 220ms ease;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Sora", sans-serif;
      color: var(--text);
      background: #F3E3D0;
      min-height: 100vh;
    }

    /* Desktop styles */
    .site-nav {
      position: relative;
      top: 18px;
      z-index: 30;
      width: var(--content-width);
      margin: 18px auto 0;
      padding: 14px 18px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(25px);
      position: sticky;
    }

    @media (min-width: 769px) {
      #mobile-menu-btn {
        display: none;
      }

      .nav-links {
        translate: none !important;
      }
    }

    #indicator {
      position: absolute;
      top: 5px;
      left: 0;
      height: calc(100% - 10px);
      border-radius: 999px;
      background: #AACDDC;
      z-index: 1;
      transition: all 0.3s cubic-bezier(0.25,1,0.5,1);
      width: 0;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-link {
      position: relative;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      transition: transform var(--ease), border-color var(--ease), background var(--ease), box-shadow var(--ease), color var(--ease);
      border: 1px solid transparent;
      color: #000000;
      text-decoration: none;
    }

    .nav-link.active {
      background: #AACDDC;
      color: #1f150f;
      border-radius: 999px;
      font-weight: 700;
    }

    .nav-link:hover {
      transform: translateY(-2px);
      border-color: var(--border-strong);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 18px 38px rgba(5, 15, 25, 0.45);
    }

    button.nav-link {
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: inherit;
      padding: 0 18px;
    }

    /* Mobile styles */
    @media (max-width: 768px) {
      .site-nav {
        justify-content: flex-start;
        gap: 12px;
        padding: 12px;
        width: 60px;
        height: 60px;
        max-width: none;
        margin: 12px 16px;
        top: 12px;
        background: none;
        border-radius: 16px;
        backdrop-filter: blur(25px);
      }

      .site-nav::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(255,255,255,0.1);
        border-radius: 16px;
        z-index: -1;
      }

      #mobile-menu-btn {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 4px;
        background: none;
        border: none;
        padding: 8px;
        cursor: pointer;
        z-index: 40;
        width: 44px;
        height: 44px;
        border-radius: 12px;
        transition: all var(--ease);
      }

      #mobile-menu-btn span {
        width: 24px;
        height: 2px;
        background: var(--muted-strong);
        transition: all var(--ease);
        transform-origin: center;
      }

      body.mobile-nav-open #mobile-menu-btn span:nth-child(1) {
        transform: rotate(45deg) translate(6px, 6px);
      }

      body.mobile-nav-open #mobile-menu-btn span:nth-child(2) {
        opacity: 0;
      }

      body.mobile-nav-open #mobile-menu-btn span:nth-child(3) {
        transform: rotate(-45deg) translate(6px, -6px);
      }

      .nav-links {
        position: fixed;
        top: 0;
        left: 0;
        width: min(320px, 85vw);
        height: 100dvh;
        background: rgba(255,255,255,0.18);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        flex-direction: column;
        padding: 0;
        gap: 0;
        translate: -100% 0;
        transition: translate var(--ease);
        z-index: 35;
        box-shadow: 4px 0 32px rgba(0,0,0,0.3);
        overflow: hidden;
      }

      .nav-links::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(255,255,255,0.08);
        z-index: -1;
      }

      body.mobile-nav-open .nav-links {
        translate: 0 0;
      }

      .nav-link {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        padding: 20px 24px;
        margin: 0;
        min-height: 64px;
        font-size: 16px;
        border-radius: 0;
        width: 100%;
        border: none;
        background: none;
        justify-content: flex-start;
        transition: all var(--ease);
      }

      .nav-link.active {
        background: rgba(170, 205, 220, 0.4);
        color: white !important;
      }

      #indicator {
        position: absolute !important;
        border-radius: 16px;
      }

      #nav-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0,0,0,0.4);
        z-index: 31;
        opacity: 0;
        visibility: hidden;
        transition: all var(--ease);
      }

      body.mobile-nav-open #nav-overlay {
        opacity: 1;
        visibility: visible;
      }

      body.mobile-nav-open {
        overflow: hidden;
      }
    }

    /* ── Home section layout ─────────────────────────── */
    #home-section {
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      /* Add subtle visual depth to background */
      background: radial-gradient(circle at 70% 50%, rgba(170, 205, 220, 0.3) 0%, transparent 60%);
    }

    .home-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: var(--content-width);
      margin: 0 auto;
      padding: 0 24px;
      gap: 60px;
      height: calc(100vh - 140px); /* Fill space safely without triggering scroll */
      box-sizing: border-box;
    }

    .home-left { 
      flex: 1; 
      padding-right: 2vw;
    }

    .brand-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 6vw, 80px);
      color: #1f150f;
      line-height: 1.1;
      letter-spacing: 4px;
      margin: 0;
      white-space: nowrap;
      text-shadow: 2px 4px 12px rgba(0, 0, 0, 0.08); /* Subtle depth */
    }

    .brand-tagline {
      font-family: 'Sora', sans-serif;
      font-size: clamp(16px, 2vw, 24px);
      color: #1f150f;
      opacity: 0.85;
      margin-top: 18px; /* Increased typography spacing */
      font-weight: 500;
      text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.04);
    }

    /* ── Feature Pill ─────────────────────────────────── */
    .feature-pill {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 8px 18px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 999px;
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #1f150f;
      letter-spacing: 0.5px;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    .feature-pill span {
      opacity: 0.85;
    }
    .feature-pill .dot {
      width: 4px;
      height: 4px;
      background: #1f150f;
      border-radius: 50%;
      opacity: 0.4;
    }

    .home-right {
      flex: 0 0 auto;
    }

    .custom-order-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .custom-order-img {
      max-width: 460px; /* Increased image size */
      max-height: 55vh;
      width: 100%;
      object-fit: contain;
      border-radius: 22px;
      box-shadow:
        0 0 35px rgba(170, 205, 220, 0.6),
        0 0 70px rgba(170, 205, 220, 0.35);
      animation: imgGlow 3s ease-in-out infinite alternate;
      transition: transform 0.4s ease;
    }
    .custom-order-img:hover { transform: scale(1.02); }

    @keyframes imgGlow {
      from { box-shadow: 0 0 35px rgba(170,205,220,0.6), 0 0 70px rgba(170,205,220,0.35); }
      to   { box-shadow: 0 0 50px rgba(170,205,220,0.85), 0 0 100px rgba(170,205,220,0.5); }
    }

    .custom-order-btn {
      padding: 15px 40px;
      background: linear-gradient(135deg, #AACDDC 0%, #90C1D2 100%);
      border: none;
      border-radius: 999px;
      color: #1f150f;
      font-family: 'Sora', sans-serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow:
        0 0 22px rgba(170,205,220,0.55),
        0 0 44px rgba(170,205,220,0.25);
      animation: btnGlow 3s ease-in-out infinite alternate;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    @keyframes btnGlow {
      from { box-shadow: 0 0 22px rgba(170,205,220,0.55), 0 0 44px rgba(170,205,220,0.25); }
      to   { box-shadow: 0 0 34px rgba(170,205,220,0.75), 0 0 68px rgba(170,205,220,0.4); }
    }

    .custom-order-btn:hover {
      transform: translateY(-4px) scale(1.07);
      box-shadow:
        0 0 38px rgba(170,205,220,0.85),
        0 0 76px rgba(170,205,220,0.5),
        0 10px 28px rgba(0,0,0,0.13);
      animation: none;
    }
    .custom-order-btn:active {
      transform: translateY(-1px) scale(1.03);
    }

    /* ── Scroll hint ──────────────────────────────────── */
    .scroll-hint {
      position: absolute;
      bottom: 120px; /* Moved up significantly from bottom */
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      pointer-events: none;
    }

    .scroll-text {
      font-size: 12px;
      font-weight: 500;
      color: #1f150f;
      opacity: 0;
      animation: textPeek 5s ease-in-out infinite;
      white-space: nowrap;
    }

    @keyframes textPeek {
      0%, 65%, 100% { opacity: 0; transform: translateY(4px); }
      18%, 50%      { opacity: 0.75; transform: translateY(0); }
    }

    .scroll-arrow {
      color: #1f150f;
      opacity: 0.65;
      animation: arrowBounce 1.8s ease-in-out infinite;
    }

    @keyframes arrowBounce {
      0%, 100% { transform: translateY(0); opacity: 0.65; }
      50%      { transform: translateY(10px); opacity: 1; }
    }

    /* ── Glassmorphism popup ──────────────────────────── */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }
    .popup-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .popup-card {
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 26px;
      padding: 48px;
      width: calc(100vw - 20px);
      height: calc(100vh - 20px);
      max-width: none;
      position: relative;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.22);
      transform: scale(0.9) translateY(24px);
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      overflow-y: auto; /* allow scrolling inside if needed */
    }
    .popup-overlay.open .popup-card {
      transform: scale(1) translateY(0);
    }

    .popup-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      color: #1f150f;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: all 0.3s ease;
    }
    .popup-close:hover {
      background: rgba(255, 255, 255, 0.32);
      transform: rotate(90deg);
      border-color: rgba(255,255,255,0.45);
    }

    /* ── Home mobile responsive ──────────────────────── */
    @media (max-width: 768px) {
      .home-content {
        flex-direction: column;
        justify-content: center;
        text-align: center;
        gap: 28px;
        padding: 0 16px;
      }
      .brand-title {
        font-size: clamp(36px, 11vw, 58px);
      }
      .custom-order-img {
        max-width: 220px;
      }
      .custom-order-btn {
        padding: 13px 32px;
        font-size: 15px;
      }
    }

    #products-section {
      min-height: 100vh;
      background: var(--bg);
      padding: 100px 20px;
    }

    .products-container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      padding-bottom: 80px;
    }

    .product-card {
      background: white;
      border: 1.5px solid rgba(31, 21, 15, 0.12);
      border-radius: 20px;
      padding: 12px;
      transition: all 0.3s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.08);
      border-color: #1f150f;
    }
    .product-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 14px;
      background: #f8f8f8;
      margin-bottom: 12px;
    }
    .product-info h3 { margin: 0; font-size: 16px; font-weight: 700; color: #1f150f; }
    .product-info p { margin: 2px 0 8px; font-size: 11px; opacity: 0.5; font-weight: 600; text-transform: uppercase; color: #1f150f; }
    
    .price-tag { display: flex; align-items: center; gap: 6px; margin-top: auto; }
    .price-old { text-decoration: line-through; opacity: 0.3; font-size: 12px; color: #1f150f; }
    .price-new { font-weight: 800; font-size: 16px; color: #1f150f; }

    .color-dots { display: flex; gap: 6px; margin-top: 12px; }
    .color-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.15); }

    /* ── Detail Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(15px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-content {
      background: white;
      width: 100%;
      max-width: 900px;
      max-height: 90vh;
      overflow-y: auto;
      border-radius: 32px;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      padding: 40px;
      gap: 40px;
      position: relative;
    }
    .close-modal {
      position: absolute;
      top: 24px;
      right: 24px;
      background: #f0f0f0;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
    }
    .modal-details h2 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; margin: 0 0 10px; color: #1f150f; }
    .add-cart-btn {
      flex: 1;
      height: 60px;
      background: #1f150f;
      color: white;
      border: none;
      border-radius: 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .add-cart-btn:hover { background: #72a5b8; transform: translateY(-2px); }

    /* ── Flying Animation ── */
    @keyframes flyToCart {
      0% { transform: scale(1); opacity: 1; top: var(--start-y); left: var(--start-x); }
      50% { transform: scale(1.5); opacity: 1; }
      100% { transform: scale(0.2); opacity: 0; top: var(--end-y); left: var(--end-x); }
    }
    .flying-qty {
      position: fixed;
      background: #72a5b8;
      color: white;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 14px;
      z-index: 9999;
      pointer-events: none;
      animation: flyToCart 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    /* ── Custom Order Form Styles ── */
    .popup-card {
      padding: 32px 48px;
      max-width: 800px;
      height: auto;
      max-height: 90vh;
      color: #1f150f;
    }
    .popup-card h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }
    .custom-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .full-width {
      grid-column: span 2;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .form-group label {
      font-size: 13px;
      font-weight: 700;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group input, .form-group select, .form-group textarea {
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.1);
      background: rgba(255, 255, 255, 0.4);
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: #72a5b8;
      background: white;
      box-shadow: 0 0 0 4px rgba(114, 165, 184, 0.15);
    }
    .form-group input:invalid:not(:placeholder-shown) {
      border-color: #ff4d4d;
    }
    .upload-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .upload-box {
      border: 2px dashed rgba(0,0,0,0.15);
      border-radius: 20px;
      height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.2);
    }
    .upload-box:hover {
      border-color: #72a5b8;
      background: rgba(114, 165, 184, 0.05);
      transform: translateY(-2px);
    }
    .upload-placeholder {
      font-size: 12px;
      text-align: center;
      opacity: 0.6;
      pointer-events: none;
    }
    .upload-placeholder svg {
      width: 32px;
      height: 32px;
      margin-bottom: 8px;
      opacity: 0.5;
    }
    .image-preview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      z-index: 2;
    }
    .options-row {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      padding: 16px;
      background: rgba(255,255,255,0.2);
      border-radius: 16px;
    }
    .radio-group {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .radio-group label {
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      text-transform: none;
      font-size: 14px;
    }
    .submit-btn {
      width: 100%;
      margin-top: 10px;
      padding: 16px;
      border: none;
      border-radius: 16px;
      background: #1f150f;
      color: white;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .submit-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }
    .submit-btn:not(:disabled):hover {
      background: #3a2a1e;
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.2);
    }
    .submit-btn:active {
      transform: translateY(-2px);
    }

  <script type="module">
    import { auth, rtdb } from './firebase.js';
    import { ref, push, serverTimestamp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
    import { showToast, updateToast } from './toast-system.js';

    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('customOrderBtn');
      const popup = document.getElementById('customPopup');
      const close = document.getElementById('popupClose');
      const form = document.getElementById('customOrderForm');
      const submitBtn = document.getElementById('submitOrderBtn');
      
      const frontInput = document.getElementById('frontImage');
      const backInput = document.getElementById('backImage');
      const frontUploadBox = document.getElementById('frontUploadBox');
      const backUploadBox = document.getElementById('backUploadBox');
      const frontPreview = document.getElementById('frontPreview');
      const backPreview = document.getElementById('backPreview');

      let currentUser = null;

      onAuthStateChanged(auth, (user) => {
        currentUser = user;
      });

      // Conditional Neck logic for custom order
      const fastenerSelect = document.getElementById('custom-fastener');
      const neckSelect = document.getElementById('custom-neck');
      if (fastenerSelect && neckSelect) {
        fastenerSelect.addEventListener('change', () => {
          const isButtons = fastenerSelect.value === 'buttons';
          const collarOption = neckSelect.querySelector('option[value="collar"]');
          if (!isButtons) {
            if (neckSelect.value === 'collar') neckSelect.value = 'v shape';
            collarOption.style.display = 'none';
          } else {
            collarOption.style.display = 'block';
          }
        });
      }

      if (btn && popup && close) {
        btn.addEventListener('click', () => {
          if (!currentUser) {
            window.location.href = 'login.html';
            return;
          }
          popup.classList.add('open');
          document.body.style.overflow = 'hidden';
        });

        const closePopup = () => {
          popup.classList.remove('open');
          document.body.style.overflow = '';
        };

        close.addEventListener('click', closePopup);
        popup.addEventListener('click', (e) => {
          if (e.target === popup) closePopup();
        });
      }

      // Image Upload Handling
      const handleImageUpload = (input, preview, box) => {
        const file = input.files[0];
        if (file) {
          // 999MB Limit
          if (file.size > 999 * 1024 * 1024) {
            showToast('Image size exceeds 999MB limit.', 'error');
            input.value = '';
            return;
          }
          const reader = new FileReader();
          reader.onload = (e) => {
            preview.src = e.target.result;
            preview.style.display = 'block';
            box.querySelector('.upload-placeholder').style.display = 'none';
            validateForm();
          };
          reader.readAsDataURL(file);
        }
      };

      frontUploadBox?.addEventListener('click', () => frontInput.click());
      backUploadBox?.addEventListener('click', () => backInput.click());
      frontInput?.addEventListener('change', () => handleImageUpload(frontInput, frontPreview, frontUploadBox));
      backInput?.addEventListener('change', () => handleImageUpload(backInput, backPreview, backUploadBox));

      // Validation
      const validateForm = () => {
        const isValid = form.checkValidity() && frontInput.files.length > 0 && backInput.files.length > 0;
        submitBtn.disabled = !isValid;
      };

      form?.addEventListener('input', validateForm);
      form?.addEventListener('change', validateForm);

      // Form Submit
      form?.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!currentUser) return;

        const toast = showToast('Uploading images...', 'loading');
        submitBtn.disabled = true;
        const originalBtnText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<div class="toast-spinner" style="width:20px;height:20px;border-width:3px;"></div> Processing...';

        try {
          // Cloudinary Upload Helper
          const uploadToCloudinary = async (file) => {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'esskay_unsigned');
            
            const res = await fetch('https://api.cloudinary.com/v1_1/derbtnk8w/image/upload', {
              method: 'POST',
              body: formData
            });
            if (!res.ok) throw new Error('Failed to upload image to Cloudinary');
            const data = await res.json();
            return data.secure_url;
          };

          // Upload both images simultaneously
          const [frontUrl, backUrl] = await Promise.all([
            uploadToCloudinary(frontInput.files[0]),
            uploadToCloudinary(backInput.files[0])
          ]);

          updateToast(toast, 'Placing your order...', 'loading');

          const formData = new FormData(form);
          const orderData = {
            userId: currentUser.uid,
            userEmail: currentUser.email,
            timestamp: Date.now(),
            type: formData.get('type'),
            fabric: formData.get('fabric'),
            size: formData.get('size'),
            quantity: parseInt(formData.get('quantity')),
            neck: formData.get('neck'),
            fastener: formData.get('fastener'),
            sleeves: formData.get('sleeves'),
            address: formData.get('address'),
            notes: formData.get('notes'),
            frontImage: frontUrl,
            backImage: backUrl,
            status: 'Pending'
          };

          await push(ref(rtdb, 'customOrders'), orderData);
          updateToast(toast, 'Order placed successfully!', 'success');
          
          setTimeout(() => {
            window.location.href = 'orders.html';
          }, 1500);
          
          // Reset form
          form.reset();
          frontPreview.style.display = 'none';
          backPreview.style.display = 'none';
          frontUploadBox.querySelector('.upload-placeholder').style.display = 'flex';
          backUploadBox.querySelector('.upload-placeholder').style.display = 'flex';
          validateForm();
          
          setTimeout(() => {
            closePopup();
          }, 1000);
        } catch (error) {
          updateToast(toast, 'Error: ' + error.message, 'error');
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalBtnText;
        }
      });
    });
  </script>

  <script type="module">
    import { auth, rtdb } from './firebase.js';
    import { ref, get, onValue, push, update } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
    import { showToast } from './toast-system.js';

    let currentUser = null;
    let selectedSize = null;
    let selectedColor = null;
    let currentQty = 5;
    let currentProduct = null;
    let userCart = {};

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      if (user) {
        onValue(ref(rtdb, `carts/${user.uid}`), (snap) => {
          userCart = snap.val() || {};
        });
      }
    });

    function checkMinQty() {
      if (!userCart) return 5;
      const alreadyInCart = Object.values(userCart).some(item => 
        item.productId === currentProduct?.id && 
        item.size === selectedSize && 
        item.color === selectedColor
      );
      return alreadyInCart ? 1 : 5;
    }

    let allProducts = [];

    // ── Load Products Logic ──
    async function loadProducts() {
      const grid = document.getElementById('product-grid');
      try {
        const snap = await get(ref(rtdb, 'products'));
        if (!snap.exists()) {
          grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; opacity: 0.5;">No products found.</p>';
          return;
        }
        allProducts = Object.entries(snap.val()).map(([id, p]) => ({ id, ...p }));
        renderFilteredProducts();
      } catch (err) {
        grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; opacity: 0.5;">Error loading products.</p>';
      }
    }

    function renderFilteredProducts() {
      const grid = document.getElementById('product-grid');
      const searchTerm = document.getElementById('search-input').value.toLowerCase();
      const sortBy = document.getElementById('sort-select').value;
      const fabF = document.getElementById('fabric-filter').value;
      const neckF = document.getElementById('neck-filter').value;
      const fastF = document.getElementById('fastener-filter').value;
      const minP = parseFloat(document.getElementById('min-price').value) || 0;
      const maxP = parseFloat(document.getElementById('max-price').value) || Infinity;

      let filtered = allProducts.filter(p => {
        // Hide products with quantity less than 5
        if (p.qtyType === 'fixed' && parseInt(p.quantity) < 5) return false;
        
        const matchesSearch = p.name.toLowerCase().includes(searchTerm) || p.category.toLowerCase().includes(searchTerm);
        const matchesFabric = fabF === 'all' || p.fabric === fabF;
        const matchesNeck = neckF === 'all' || p.neck === neckF;
        const matchesFast = fastF === 'all' || p.fastenerType === fastF;
        const finalPrice = parseFloat(p.discountPrice || p.price);
        const matchesPrice = finalPrice >= minP && finalPrice <= maxP;
        return matchesSearch && matchesFabric && matchesNeck && matchesFast && matchesPrice;
      });

      // Sorting
      if (sortBy === 'price-low') filtered.sort((a,b) => (a.discountPrice||a.price) - (b.discountPrice||b.price));
      else if (sortBy === 'price-high') filtered.sort((a,b) => (b.discountPrice||b.price) - (a.discountPrice||a.price));
      else filtered.reverse(); // Default: Latest (Assuming entries follow push order)

      grid.innerHTML = '';
      filtered.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        const priceHTML = p.discountPrice 
          ? `<span class="price-old">₹${parseFloat(p.price).toFixed(2)}</span><span class="price-new">₹${parseFloat(p.discountPrice).toFixed(2)}</span>`
          : `<span class="price-new">₹${parseFloat(p.price).toFixed(2)}</span>`;
        const thumbUrl = p.media?.[0]?.url || p.images?.[0] || 'https://via.placeholder.com/300';
        
        const qtyVal = parseInt(p.quantity);
        const lowStock = (p.qtyType === 'fixed' && !isNaN(qtyVal) && qtyVal < 15) 
          ? `<div style="position:absolute; top:12px; right:12px; background:rgba(255,77,77,0.9); color:white; padding:4px 10px; border-radius:8px; font-size:10px; font-weight:800; z-index:5;">ONLY ${qtyVal} REMAINING</div>`
          : '';

        card.innerHTML = `
          ${lowStock}
          <img src="${thumbUrl}" class="product-img">
          <div class="product-info">
            <p>${p.category}</p>
            <h3>${p.name}</h3>
            <div class="color-dots">${(p.colors || []).map(c => `<div class="color-dot" style="background:${c}"></div>`).join('')}</div>
          </div>
          <div class="price-tag">${priceHTML}</div>
        `;
        card.onclick = () => openProductDetail(p.id, p);
        grid.appendChild(card);
      });
    }

    // Attach Filter Listeners
    document.getElementById('search-input').oninput = renderFilteredProducts;
    document.getElementById('sort-select').onchange = renderFilteredProducts;
    document.getElementById('fabric-filter').onchange = renderFilteredProducts;
    document.getElementById('neck-filter').onchange = renderFilteredProducts;
    document.getElementById('fastener-filter').onchange = renderFilteredProducts;
    document.getElementById('min-price').oninput = renderFilteredProducts;
    document.getElementById('max-price').oninput = renderFilteredProducts;

    function openProductDetail(id, p) {
      currentProduct = { id, ...p };
      selectedSize = null;
      selectedColor = null;
      currentQty = 5;
      document.getElementById('qty-display').innerText = '5';

      const modal = document.getElementById('product-detail-modal');
      const firstMediaUrl = p.media?.[0]?.url || p.images?.[0] || '';
      document.getElementById('modal-main-img').src = firstMediaUrl;
      document.getElementById('modal-prod-name').innerText = p.name;
      document.getElementById('modal-fabric-tag').innerText = `Fabric: ${p.fabric}`;
      document.getElementById('modal-neck-tag').innerText = `Neck: ${p.neck || 'Standard'}`;
      document.getElementById('modal-fastener-tag').innerText = `Fastener: ${p.fastenerType || 'Plain'}`;
      document.getElementById('modal-prod-new-price').innerText = `₹${p.discountPrice || p.price}`;
      document.getElementById('modal-prod-old-price').innerText = p.discountPrice ? `₹${p.price}` : '';

      // Thumbs
      const thumbs = document.getElementById('modal-media-thumbs');
      const allMedia = p.media || (p.images || []).map(img => ({url: img, type: 'image'}));
      
      thumbs.innerHTML = allMedia.map((m, i) => `
        <img src="${m.url}" style="width:80px; height:80px; border-radius:12px; cursor:pointer; object-fit:cover; opacity:${i===0?'1':'0.6'}; border:${i===0?'2px solid #72a5b8':'none'};" 
          onclick="document.getElementById('modal-main-img').src='${m.url}'; Array.from(this.parentElement.children).forEach(t=>{t.style.opacity='0.6'; t.style.border='none'}); this.style.opacity='1'; this.style.border='2px solid #72a5b8';">
      `).join('');

      // Sizes
      const sizes = document.getElementById('modal-prod-sizes');
      sizes.innerHTML = '';
      (p.sizes || []).forEach(s => {
        const btn = document.createElement('div');
        btn.className = 'size-btn';
        btn.style.cssText = 'padding:10px 20px; border:1px solid #ddd; border-radius:12px; cursor:pointer; font-weight:600; transition:0.3s; color:#1f150f;';
        btn.innerText = s;
        btn.onclick = () => {
          selectedSize = s;
          Array.from(sizes.children).forEach(b => {
            b.style.background = 'white';
            b.style.color = '#1f150f';
          });
          btn.style.background = '#1f150f';
          btn.style.color = 'white';
          
          const min = checkMinQty();
          if (currentQty < min) {
            currentQty = min;
            document.getElementById('qty-display').innerText = currentQty;
          }
        };
        sizes.appendChild(btn);
      });

      // Colors
      const colors = document.getElementById('modal-prod-colors');
      colors.innerHTML = '';
      (p.colors || []).forEach(c => {
        const opt = document.createElement('div');
        opt.className = 'color-option';
        opt.style.cssText = 'width:32px; height:32px; border-radius:50%; border:2px solid transparent; cursor:pointer; padding:2px;';
        opt.innerHTML = `<div style="width:100%; height:100%; border-radius:50%; background:${c}"></div>`;
        opt.onclick = () => {
          selectedColor = c;
          Array.from(colors.children).forEach(b => b.style.borderColor = 'transparent');
          opt.style.borderColor = '#1f150f';
          
          const min = checkMinQty();
          if (currentQty < min) {
            currentQty = min;
            document.getElementById('qty-display').innerText = currentQty;
          }
        };
        colors.appendChild(opt);
      });

      // Fasteners selection removed as per request (now static)
      modal.style.display = 'flex';
    }

    document.getElementById('qty-inc').onclick = () => { currentQty++; document.getElementById('qty-display').innerText = currentQty; };
    document.getElementById('qty-dec').onclick = () => { 
      const min = checkMinQty();
      if(currentQty > min) { currentQty--; document.getElementById('qty-display').innerText = currentQty; } 
    };

    document.getElementById('add-prod-to-cart').onclick = async (e) => {
      if (!currentUser) { showToast('Please login to add to cart', 'error'); return; }
      if (!selectedSize || !selectedColor) { showToast('Please select size and color', 'error'); return; }

      // Flying Animation
      const btn = e.target;
      const btnRect = btn.getBoundingClientRect();
      const cartBtn = document.querySelector('a[href="cart.html"]');
      if (cartBtn) {
        const cartRect = cartBtn.getBoundingClientRect();
        const fly = document.createElement('div');
        fly.className = 'flying-qty';
        fly.innerText = `+${currentQty}`;
        fly.style.setProperty('--start-x', `${btnRect.left + btnRect.width/2}px`);
        fly.style.setProperty('--start-y', `${btnRect.top}px`);
        fly.style.setProperty('--end-x', `${cartRect.left + cartRect.width/2}px`);
        fly.style.setProperty('--end-y', `${cartRect.top}px`);
        document.body.appendChild(fly);
        setTimeout(() => fly.remove(), 800);
      }

      try {
        // Find existing item for merging
        let existingKey = null;
        for (const key in userCart) {
          const item = userCart[key];
          if (item.productId === currentProduct.id && item.size === selectedSize && item.color === selectedColor) {
            existingKey = key;
            break;
          }
        }

        if (existingKey) {
          const newQty = userCart[existingKey].quantity + currentQty;
          await update(ref(rtdb, `carts/${currentUser.uid}/${existingKey}`), { quantity: newQty });
        } else {
          const cartItem = {
            productId: currentProduct.id,
            name: currentProduct.name,
            originalPrice: currentProduct.price,
            price: currentProduct.discountPrice || currentProduct.price,
            size: selectedSize,
            color: selectedColor,
            neck: currentProduct.neck || 'Standard',
            fastener: currentProduct.fastenerType || 'Plain',
            quantity: currentQty,
            image: currentProduct.media?.[0]?.url || currentProduct.images?.[0] || '',
            addedAt: Date.now()
          };
          await push(ref(rtdb, `carts/${currentUser.uid}`), cartItem);
        }
        
        setTimeout(() => document.getElementById('product-detail-modal').style.display = 'none', 500);
      } catch (err) {
        showToast('Failed to add to cart', 'error');
      }
    };

    document.getElementById('close-detail-modal').onclick = () => document.getElementById('product-detail-modal').style.display = 'none';
    window.onclick = (e) => { if (e.target.id === 'product-detail-modal') document.getElementById('product-detail-modal').style.display = 'none'; };

    loadProducts();

    // ── Handle Auto Scroll from other pages ──
    window.addEventListener('load', () => {
      if (window.location.hash === '#products-section') {
        const target = document.getElementById('products-section');
        if (target) {
          setTimeout(() => {
            target.scrollIntoView({ behavior: 'smooth' });
          }, 500);
        }
      }
    });
  </script>
</body>
</html>
