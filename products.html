<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - EssKay Sportswear</title>
  <script type="module" src="firebase.js"></script>
  <script type="module" src="app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="navbar-complete.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #0a1018;
      --surface: rgba(255, 255, 255, 0.08);
      --surface-strong: rgba(8, 13, 21, 0.74);
      --surface-muted: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.12);
      --border-strong: rgba(123, 231, 255, 0.18);
      --text: #f8fbff;
      --muted: #aab4c2;
      --muted-strong: #D2C4B4;
      --accent: #7be7ff;
      --accent-strong: #96fff0;
      --shadow: 0 25px 80px rgba(0, 0, 0, 0.45);
      --radius-lg: 32px;
      --content-width: min(1240px, calc(100% - 32px));
      --ease: 220ms ease;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Sora", sans-serif;
      color: var(--text);
      background: #F3E3D0;
      min-height: 100vh;
    }

    .site-nav {
      position: relative;
      top: 18px;
      z-index: 30;
      width: var(--content-width);
      margin: 18px auto 0;
      padding: 14px 18px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(25px);
      position: sticky;
    }

    #indicator {
      position: absolute;
      top: 5px;
      left: 0;
      height: calc(100% - 10px);
      border-radius: 999px;
      background: #AACDDC;
      z-index: 1;
      transition: all 0.3s cubic-bezier(0.25,1,0.5,1);
      width: 0;
    }

    .nav-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-link {
      position: relative;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      transition: transform var(--ease), border-color var(--ease), background var(--ease), box-shadow var(--ease);
      border: 1px solid transparent;
      color: var(--muted-strong);
      text-decoration: none;
    }

    .nav-link.active {
      background: #AACDDC;
      color: white;
      border-radius: 999px;
    }

    .nav-link:hover {
      transform: translateY(-2px);
      border-color: var(--border-strong);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 18px 38px rgba(5, 15, 25, 0.45);
    }
  </style>
</head>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const links = document.querySelectorAll(".nav-link");
    const currentPage = window.location.pathname.split("/").pop() || "index.html";

    links.forEach(link => {
      link.classList.remove("active");
      const linkPage = link.getAttribute("href");
      if (linkPage !== "#" && linkPage === currentPage) {
        link.classList.add("active");
      }
    });
  });
</script>
<body>
  <nav class="site-nav glass">

    <div class="nav-links">
      <a class="nav-link" href="index.html"><img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home" style="width:20px;height:20px;margin-right:4px;">Home</a>
      <a class="nav-link active" href="products.html"><img src="https://cdn-icons-png.flaticon.com/512/4804/4804045.png" alt="Products" style="width:20px;height:20px;margin-right:4px;">Products</a>
      <a class="nav-link" href="cart.html"><img src="https://static.vecteezy.com/system/resources/previews/019/787/018/non_2x/shopping-cart-icon-shopping-basket-on-transparent-background-free-png.png" alt="Cart" style="width:20px;height:20px;margin-right:4px;">Cart</a>
      <a class="nav-link" href="login.html"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSkbpugr3eQwxV_gINbKOZE_RKL3_pbvoTiuQ&s" alt="Login" style="width:20px;height:20px;margin-right:4px;">SignUp/Login</a>
    </div>
  </nav>

  <div id="mainContent">
    <h1>Products Page</h1>
    <p>Browse our sportswear collection. Products will be loaded dynamically via app.js.</p>
  </div>
</body>
</html>
